mod_description=\u300A\u8F66\u4E07\u5973\u4EC6\uFF1A\u5FC3\u5951\u540C\u7720\u300B\u662F\u4E00\u4E2A\u4EE5\u8F66\u4E07\u5973\u4EC6\u4E3A\u6838\u5FC3\u7684\u604B\u7231\u4E0E\u5BB6\u5EAD\u6269\u5C55\u6A21\u7EC4\u3002\n\n\u4F60\u53EF\u4EE5\u4E0E\u81EA\u5DF1\u7684\u5973\u4EC6\u4E00\u6B65\u6B65\u57F9\u517B\u597D\u611F\u3001\u8868\u767D\u3001\u4EA4\u6362\u6212\u6307\u3001\u7F14\u7ED3\u8A93\u7EA6\uFF0C\u9010\u6E10\u5EFA\u7ACB\u66F4\u4EB2\u5BC6\u7684\u5173\u7CFB\u3002\u6700\u7EC8\u517B\u80B2\u5B69\u5B50\uFF0C\u5171\u540C\u89C1\u8BC1\u5979\u7684\u6210\u957F\u3002\u6A21\u7EC4\u52A0\u5165\u4E86\u4E30\u5BCC\u7684\u52A8\u4F5C\u3001\u4EB2\u5BC6\u4E92\u52A8\u3001\u5FC3\u60C5\u53D8\u5316\u3001\u5DE5\u4F5C\u5B66\u4E60\u4E0E\u63A2\u7D22\u7B49\u5185\u5BB9\uFF0C\u8BA9\u5973\u4EC6\u4E0D\u518D\u53EA\u662F\u65C5\u9014\u4E2D\u7684\u4F19\u4F34\uFF0C\u800C\u662F\u80FD\u4E0E\u4F60\u5171\u540C\u751F\u6D3B\u7684\u5BB6\u4EBA\u3002\n\nTouhou Little Maid: Heart Pact is a romance and family expansion built around Touhou Little Maid.\n\nBuild affection with your own maid step by step, confess your feelings, exchange rings, make vows, and grow into a closer relationship. Eventually, you can raise a child together and watch her grow. The mod adds rich animations, intimate interactions, mood changes, study tasks, work and exploration, turning your maid from a travel companion into family who shares life with you.
mod_description_legacy=\u300A\u8F66\u4E07\u5973\u4EC6\uFF1A\u5FC3\u5951\u540C\u7720\u300B\u662F\u4E00\u4E2A\u4EE5\u8F66\u4E07\u5973\u4EC6\u4E3A\u6838\u5FC3\u7684\u604B\u7231\u4E0E\u5BB6\u5EAD\u6269\u5C55\u6A21\u7EC4\u3002\u4F60\u53EF\u4EE5\u4E0E\u81EA\u5DF1\u7684\u5973\u4EC6\u4E00\u6B65\u6B65\u57F9\u517B\u597D\u611F\u3001\u8868\u767D\u3001\u4EA4\u6362\u6212\u6307\u3001\u7F14\u7ED3\u8A93\u7EA6\uFF0C\u9010\u6E10\u5EFA\u7ACB\u66F4\u4EB2\u5BC6\u7684\u5173\u7CFB\u3002\u6700\u7EC8\u517B\u80B2\u5B69\u5B50\uFF0C\u5171\u540C\u89C1\u8BC1\u5979\u7684\u6210\u957F\u3002\u6A21\u7EC4\u52A0\u5165\u4E86\u4E30\u5BCC\u7684\u52A8\u4F5C\u3001\u4EB2\u5BC6\u4E92\u52A8\u3001\u5FC3\u60C5\u53D8\u5316\u3001\u5DE5\u4F5C\u5B66\u4E60\u4E0E\u63A2\u7D22\u7B49\u5185\u5BB9\uFF0C\u8BA9\u5973\u4EC6\u4E0D\u518D\u53EA\u662F\u65C5\u9014\u4E2D\u7684\u4F19\u4F34\uFF0C\u800C\u662F\u80FD\u4E0E\u4F60\u5171\u540C\u751F\u6D3B\u7684\u5BB6\u4EBA\u3002 Touhou Little Maid: Heart Pact is a romance and family expansion built around Touhou Little Maid. Build affection with your own maid step by step, confess your feelings, exchange rings, make vows, and grow into a closer relationship. Eventually, you can raise a child together and watch her grow. The mod adds rich animations, intimate interactions, mood changes, study tasks, work and exploration, turning your maid from a travel companion into family who shares life with you.

